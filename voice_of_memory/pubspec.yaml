name: voice_of_memory
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cloud_firestore: ^5.6.9
  firebase_core: ^3.14.0
  google_fonts: ^6.3.3
  go_router: ^12.1.3
  http: ^1.4.0
  intl: ^0.20.2
  just_audio: ^0.10.4
  path_provider: ^2.1.4
  provider: ^6.1.5
  record: ^6.0.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  page_transition: ^2.1.0
  cupertino_icons: ^1.0.0
  collection: ^1.18.0
  file_picker: ^10.1.9
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0
  timeago: ^3.7.1
  share_plus: ^10.0.2
  auto_size_text: ^3.0.0
  equatable: ^2.0.7
  mime_type: ^1.0.0
  sqflite: ^2.3.3
  stream_transform: ^2.1.0
  video_player: ^2.10.0
  font_awesome_flutter: ^10.7.0
  html: ^0.15.6
  csslib: ^1.0.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/videos/
    - assets/audios/
    - assets/rive_animations/
    - assets/pdfs/
    - assets/jsons/
