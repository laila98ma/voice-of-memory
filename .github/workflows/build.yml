name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - run: cd voice_of_memory && flutter pub get
      - run: cd voice_of_memory && flutter build apk --release
      - uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: voice_of_memory/build/app/outputs/flutter-apk/app-release.apk
